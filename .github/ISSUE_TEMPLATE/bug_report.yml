name: Bug report
description: Report a bug or regression in mineconda
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please include enough detail to reproduce the problem locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: Describe the observed behavior and the expected result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, sample manifests, or lockfiles when relevant.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, loader, Minecraft version, Java version, and mineconda version/commit.
      placeholder: macOS 15 / zsh / NeoForge 1.21.1 / Java 21 / mineconda 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant command output, stack traces, or screenshots.
      render: shell
