name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: rust-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build CLI Binary
        run: cargo build -p mineconda-cli --release

      - name: Verify CLI Binary
        run: ./target/release/mineconda --help >/dev/null

      - name: Smoke
        env:
          MINECONDA_BIN: ${{ github.workspace }}/target/release/mineconda
        run: bash scripts/ci-smoke.sh
