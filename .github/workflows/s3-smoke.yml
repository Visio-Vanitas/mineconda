name: experimental-s3-smoke

on:
  workflow_dispatch:
    inputs:
      ssh_target:
        description: Remote SSH target for the experimental S3 smoke host
        required: false
      remote_port:
        description: Remote S3 service port
        required: false
        default: "19000"
      local_port:
        description: Local forwarded port
        required: false
        default: "39000"
      source_bucket:
        description: Public source bucket used by sources.s3 smoke
        required: false
        default: mineconda-source-smoke
      cache_bucket:
        description: Private cache bucket used by cache.s3 smoke
        required: false
        default: mineconda-cache-smoke
permissions:
  contents: read

concurrency:
  group: experimental-s3-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  s3-smoke:
    name: release-experimental-s3-smoke
    runs-on: ${{ vars.MINECONDA_S3_RUNNER_LABEL || 's3-smoke-runner' }}
    timeout-minutes: 45
    env:
      MINECONDA_S3_SSH_TARGET: ${{ inputs.ssh_target || vars.MINECONDA_S3_SSH_TARGET || '' }}
      MINECONDA_S3_REMOTE_PORT: ${{ inputs.remote_port || vars.MINECONDA_S3_REMOTE_PORT || '19000' }}
      MINECONDA_S3_LOCAL_PORT: ${{ inputs.local_port || vars.MINECONDA_S3_LOCAL_PORT || '39000' }}
      MINECONDA_S3_SOURCE_BUCKET: ${{ inputs.source_bucket || vars.MINECONDA_S3_SOURCE_BUCKET || 'mineconda-source-smoke' }}
      MINECONDA_S3_CACHE_BUCKET: ${{ inputs.cache_bucket || vars.MINECONDA_S3_CACHE_BUCKET || 'mineconda-cache-smoke' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI Binary
        run: cargo build -p mineconda-cli --release

      - name: Verify CLI Binary
        run: ./target/release/mineconda --help >/dev/null

      - name: Validate Experimental S3 Inputs
        shell: bash
        run: |
          if [[ -z "${MINECONDA_S3_SSH_TARGET}" ]]; then
            echo "::error title=Missing remote target::Set workflow input ssh_target or repository variable MINECONDA_S3_SSH_TARGET."
            exit 1
          fi

      - name: Enhanced S3 Smoke
        env:
          MINECONDA_BIN: ${{ github.workspace }}/target/release/mineconda
          MINECONDA_ENABLE_S3_SMOKE: "1"
          MINECONDA_S3_REMOTE_PRIVILEGE_SECRET: ${{ secrets.MINECONDA_S3_REMOTE_PRIVILEGE_SECRET }}
        run: bash scripts/ci-smoke.sh
